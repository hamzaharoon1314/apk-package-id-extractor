name: Update Repository Index

on:
  workflow_run:
    workflows:
      - Update APK package IDs
    types:
      - completed

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SEO index
        run: |

          mkdir -p docs

          REPO_URL="https://github.com/${{ github.repository }}"

          INDEX_FILE="docs/README.md"

          echo "# APK Package ID Repository Index" > "$INDEX_FILE"
          echo "" >> "$INDEX_FILE"

          echo "Browse tracked Android APK repositories with extracted package IDs, Discoverium configs, Obtainium-compatible JSON, SHA256 hashes, Play Store links, and APK metadata." >> "$INDEX_FILE"

          echo "" >> "$INDEX_FILE"

          echo "This repository automatically scans GitHub APK release repositories and generates searchable metadata indexes for Android apps." >> "$INDEX_FILE"

          echo "" >> "$INDEX_FILE"

          echo "## Available APK Repositories" >> "$INDEX_FILE"

          echo "" >> "$INDEX_FILE"

          find docs -maxdepth 1 -name "*.md" ! -name "README.md" | sort | while read file; do

            filename=$(basename "$file")

            repo_name="${filename%.md}"

            pretty_name=$(echo "$repo_name" | sed 's/__/\//g')

            echo "### ${pretty_name}" >> "$INDEX_FILE"

            echo "" >> "$INDEX_FILE"

            echo "- APK package IDs" >> "$INDEX_FILE"
            echo "- Discoverium configs" >> "$INDEX_FILE"
            echo "- Obtainium-compatible JSON" >> "$INDEX_FILE"
            echo "- SHA256 hashes" >> "$INDEX_FILE"
            echo "- APK metadata" >> "$INDEX_FILE"

            echo "" >> "$INDEX_FILE"

            echo "[View Repository Metadata](${REPO_URL}/blob/main/docs/${filename})" >> "$INDEX_FILE"

            echo "" >> "$INDEX_FILE"

          done

          echo "---" >> "$INDEX_FILE"

          echo "" >> "$INDEX_FILE"

          echo "_Automatically generated by GitHub Actions._" >> "$INDEX_FILE"

      - name: Commit and push
        run: |

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f docs/README.md

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update repository index"

          git push